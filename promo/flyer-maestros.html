<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #f3f4f6; display: flex; align-items: center; justify-content: center; min-height: 100vh; font-family: -apple-system, 'Segoe UI', sans-serif; }

  .card {
    width: 1080px;
    height: 1080px;
    background: linear-gradient(145deg, #f97316 0%, #ea580c 60%, #c2410c 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 80px;
    position: relative;
    overflow: hidden;
  }

  /* Círculos decorativos */
  .circle1 { position:absolute; width:500px; height:500px; border-radius:50%; border:60px solid rgba(255,255,255,0.07); top:-120px; right:-120px; }
  .circle2 { position:absolute; width:350px; height:350px; border-radius:50%; border:50px solid rgba(255,255,255,0.06); bottom:-80px; left:-80px; }
  .circle3 { position:absolute; width:200px; height:200px; border-radius:50%; background:rgba(255,255,255,0.05); top:60px; left:60px; }

  .badge {
    background: rgba(255,255,255,0.2);
    border: 2px solid rgba(255,255,255,0.4);
    color: white;
    font-size: 22px;
    font-weight: 700;
    padding: 12px 32px;
    border-radius: 100px;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 40px;
  }

  .logo-area {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 50px;
  }
  .logo-icon {
    width: 72px;
    height: 72px;
    background: white;
    border-radius: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 36px;
  }
  .logo-text {
    color: white;
    font-size: 42px;
    font-weight: 900;
    letter-spacing: -1px;
  }
  .logo-text span { color: rgba(255,255,255,0.7); font-weight: 400; font-size: 32px; }

  h1 {
    color: white;
    font-size: 80px;
    font-weight: 900;
    text-align: center;
    line-height: 1.0;
    letter-spacing: -2px;
    margin-bottom: 30px;
  }
  h1 em {
    font-style: normal;
    color: #fef08a;
    display: block;
  }

  .subtitle {
    color: rgba(255,255,255,0.85);
    font-size: 28px;
    text-align: center;
    line-height: 1.5;
    margin-bottom: 60px;
    max-width: 780px;
  }

  .benefits {
    display: flex;
    gap: 24px;
    margin-bottom: 64px;
  }
  .benefit {
    background: rgba(255,255,255,0.15);
    border: 1.5px solid rgba(255,255,255,0.3);
    border-radius: 20px;
    padding: 20px 28px;
    display: flex;
    align-items: center;
    gap: 14px;
    color: white;
    font-size: 22px;
    font-weight: 600;
  }
  .benefit-icon {
    font-size: 30px;
  }

  .cta-box {
    background: white;
    border-radius: 24px;
    padding: 32px 60px;
    text-align: center;
  }
  .cta-box .free {
    color: #ea580c;
    font-size: 20px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: 4px;
  }
  .cta-box .url {
    color: #1a1a1a;
    font-size: 40px;
    font-weight: 900;
    letter-spacing: -1px;
  }
  .cta-box .sub {
    color: #6b7280;
    font-size: 18px;
    margin-top: 4px;
  }
</style>
</head>
<body>
<div class="card">
  <div class="circle1"></div>
  <div class="circle2"></div>
  <div class="circle3"></div>

  <div class="badge">🔧 Para maestros independientes</div>

  <h1>
    Más clientes,
    <em>más trabajo.</em>
  </h1>

  <p class="subtitle">
    Publica tu perfil y que los clientes de tu comuna<br>
    te encuentren y te contacten directo por WhatsApp
  </p>

  <div class="benefits">
    <div class="benefit">
      <span class="benefit-icon">✅</span>
      Sin intermediarios
    </div>
    <div class="benefit">
      <span class="benefit-icon">📲</span>
      Contacto directo
    </div>
    <div class="benefit">
      <span class="benefit-icon">🎁</span>
      30 días gratis
    </div>
  </div>

  <div class="cta-box">
    <div class="free">Regístrate gratis en</div>
    <div class="url">UrgenteYa.cl</div>
    <div class="sub">Sin tarjeta · Sin compromiso</div>
  </div>
</div>
</body>
</html>
