# UrgenteYa.cl — Nginx configuration
# Coloca este archivo en: /etc/nginx/sites-available/urgenteya
# Luego: sudo ln -s /etc/nginx/sites-available/urgenteya /etc/nginx/sites-enabled/
# SSL lo agrega Certbot automáticamente al correr: sudo certbot --nginx -d urgenteya.cl -d www.urgenteya.cl

server {
    listen 80;
    server_name urgenteya.cl www.urgenteya.cl;

    # Logs
    access_log /var/log/nginx/urgenteya-access.log;
    error_log  /var/log/nginx/urgenteya-error.log;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1000;

    # Archivos estáticos del frontend (React build)
    root /var/www/urgenteya/frontend;
    index index.html;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Uploads — servir directamente por Nginx (más eficiente que Node)
    location /uploads/ {
        alias /var/www/urgenteya/backend/uploads/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff";
    }

    # API — proxy al backend Node.js
    location /api/ {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;

        # Limite de tamaño para uploads
        client_max_body_size 15M;
    }

    # Sitemap dinámico — proxy al backend
    location = /sitemap.xml {
        proxy_pass       http://127.0.0.1:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # React SPA — todas las rutas van al index.html
    location / {
        try_files $uri $uri/ /index.html;

        # Cache para assets estáticos con hash en el nombre
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }
}
